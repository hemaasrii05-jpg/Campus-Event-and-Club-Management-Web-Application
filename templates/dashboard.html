<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>
<body>
    <h1>Dashboard</h1>
    <a href="/logout">Logout</a>
    <h2>Clubs</h2>
    <ul>
        {% for club in clubs %}
        <li>{{ club.name }} - {{ club.description }}</li>
        {% endfor %}
    </ul>
    <h3>Create Club</h3>
    <form method="POST" action="/create_club">
        <label for="name">Name:</label>
        <input type="text" name="name" required><br>
        <label for="description">Description:</label>
        <textarea name="description"></textarea><br>
        <button type="submit">Create Club</button>
    </form>
    <h2>Events</h2>
    <ul>
        {% for event in events %}
        <li>{{ event.title }} - {{ event.description }} - {{ event.date.strftime('%Y-%m-%d %H:%M') }}
            <form method="POST" action="/register_event/{{ event.id }}" style="display:inline;">
                <button type="submit">Register</button>
            </form>
        </li>
        {% endfor %}
    </ul>
    <h2>Create Event</h2>
    <form method="POST" action="/create_event">
        <label for="title">Title:</label>
        <input type="text" name="title" required><br>
        <label for="description">Description:</label>
        <textarea name="description"></textarea><br>
        <label for="date">Date:</label>
        <input type="datetime-local" name="date" required><br>
        <label for="club">Club:</label>
        <select name="club_id" required>
            {% for club in clubs %}
            <option value="{{ club.id }}">{{ club.name }}</option>
            {% endfor %}
        </select><br>
        <button type="submit">Create Event</button>
    </form>
</body>
</html>
