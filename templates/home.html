<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Event Manager</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: whitesmoke;
      color: #1f2937;
      min-height: 100vh;
    }

    .hero-card {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      box-sizing: border-box;
    }

    .hero-text {
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
      max-width: 650px;
      text-align: center;
    }

    .hero-text h1 {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 2.2rem;
      color: #4f46e5;
    }

    .hero-text p {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #4b5563;
      margin-bottom: 1.5rem;
    }

    .hero-actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 0.8rem 1.2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #4f46e5;
      color: white;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="hero-card">
    <div class="hero-text">
      <h1>🎓 Campus Event Manager</h1>
      <p>Welcome! Create and manage campus events with a single dashboard.</p>
      <div class="hero-actions">
        <a href="/register" class="btn btn-primary">Create Account</a>
        <a href="/login" class="btn btn-secondary">Sign In</a>
      </div>
    </div>
  </div>
</body>
</html>
