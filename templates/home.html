<!DOCTYPE html>
<html>
<head>
    <title>Campus Event Manager</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .hero { text-align: center; background: white; padding: 50px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; }
        h1 { color: #333; font-size: 24px; }
        .btn { display: block; padding: 12px; margin: 10px 0; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn-reg { background-color: #007bff; color: white; }
        .btn-log { border: 2px solid #007bff; color: #007bff; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🎓 Campus Event Manager</h1>
        <p>Welcome! Please join us or sign in to manage your events.</p>
        <br>
        <a href="/register" class="btn btn-reg">Create Account</a>
        <a href="/login" class="btn btn-log">Sign In</a>
    </div>
</body>
</html>
