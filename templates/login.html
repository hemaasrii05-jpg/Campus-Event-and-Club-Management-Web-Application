<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: whitesmoke;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 380px;
        }

        .auth-card h2 {
            margin-top: 0;
            margin-bottom: 1rem;
            text-align: center;
            color: #333;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .auth-form label {
            font-weight: 600;
            color: #444;
        }

        .auth-form input {
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            width: 100%;
            box-sizing: border-box;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            cursor: pointer;
        }

        button[type="submit"] {
            margin-top: 0.5rem;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            background: #171717;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .error {
            color: #dc2626;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
        }

        .auth-help {
            text-align: center;
            margin-top: 0.9rem;
            font-size: 0.95rem;
        }

        .auth-help a {
            color: #4f46e5;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Login</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <p class="error">{{ messages[0] }}</p>
            {% endif %}
        {% endwith %}

        <form class="auth-form" method="POST">
            <label>Email</label>
            <input type="email" name="email" placeholder="Email" required>

            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="login-password" name="password" placeholder="Password" required>
                <button type="button" class="toggle-password" data-target="login-password" aria-label="Show password">👁</button>
            </div>

            <button type="submit">Login</button>
        </form>

        <p class="auth-help">No account? <a href="/register">Register</a></p>
        <p class="auth-help"><a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a></p>
    </div>
</body>
</html>
