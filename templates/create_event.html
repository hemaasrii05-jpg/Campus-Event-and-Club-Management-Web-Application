{% extends 'base.html' %}
{% block content %}
<div class="container">
  <h1>Create Event</h1>
  <form method="post" action="/events/create" class="auth-form">
    <label>Title</label>
    <input name="title" required value="{{ form.title|default('') }}">

    <label>Description</label>
    <textarea name="description">{{ form.description|default('') }}</textarea>

    <label>Start</label>
    <input type="datetime-local" name="start_datetime" value="{{ form.start_datetime|default('') }}">

    <label>End</label>
    <input type="datetime-local" name="end_datetime" value="{{ form.end_datetime|default('') }}">

    <label>Location</label>
    <input name="location" value="{{ form.location|default('') }}">

    <label>Capacity</label>
    <input name="capacity" type="number" value="{{ form.capacity|default('') }}">

    <button type="submit">Create Event</button>
  </form>
</div>
{% endblock %}
