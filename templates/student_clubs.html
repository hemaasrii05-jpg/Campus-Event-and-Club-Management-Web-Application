<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Clubs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .clubs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .club-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .club-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .club-card h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .club-category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-bottom: 15px;
        }

        .club-description {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .club-members {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .members-count {
            color: #764ba2;
            font-weight: bold;
        }

        .join-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s ease;
        }

        .join-btn:hover {
            background: #764ba2;
        }

        .join-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Student Clubs</h1>
            <p>Explore clubs and join your interests</p>
        </div>

        <div id="clubs-container" class="clubs-grid">
            <div class="loading">Loading clubs...</div>
        </div>
    </div>

    <script>
        // Fetch and display clubs
        async function loadClubs() {
            try {
                const response = await fetch('/api/clubs');
                if (!response.ok) {
                    throw new Error('Failed to fetch clubs');
                }
                const clubs = await response.json();
                displayClubs(clubs);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('clubs-container').innerHTML = 
                    '<div class="error">Failed to load clubs. Please try again later.</div>';
            }
        }

        function displayClubs(clubs) {
            const container = document.getElementById('clubs-container');
            container.innerHTML = '';

            clubs.forEach(club => {
                const card = document.createElement('div');
                card.className = 'club-card';
                card.innerHTML = `
                    <h2>${club.name}</h2>
                    <span class="club-category">${club.category}</span>
                    <p class="club-description">${club.description}</p>
                    <div class="club-members">
                        <span class="members-count">👥 ${club.members} Members</span>
                        <button class="join-btn" onclick="joinClub(${club.id})">Join</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function joinClub(clubId) {
            try {
                const response = await fetch(`/api/clubs/${clubId}/join`, {
                    method: 'POST'
                });
                if (response.ok) {
                    alert('Successfully joined the club!');
                    loadClubs(); // Reload clubs to show updated member count
                } else {
                    alert('Failed to join club');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred');
            }
        }

        // Load clubs when page loads
        loadClubs();
    </script>
</body>
</html>
