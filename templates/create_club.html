<!DOCTYPE html>
<html>
<head><title>Register Club</title></head>
<body style="font-family: sans-serif; padding: 50px; background-color: #f4f7f6;">
    <div style="background: white; padding: 30px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <h2>Register Your Club</h2>
        <form method="POST">
            <input type="text" name="club_name" placeholder="Club Name (e.g. Robotics Club)" style="width:100%; margin: 10px 0; padding: 10px;" required>
            <textarea name="club_desc" placeholder="What does your club do?" style="width:100%; margin: 10px 0; padding: 10px;" rows="4"></textarea>
            <button type="submit" style="width:100%; padding:10px; background: #e67e22; color: white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Create Club</button>
        </form>
        <br>
        <a href="/dashboard">Back to Dashboard</a>
    </div>
</body>
</html>
