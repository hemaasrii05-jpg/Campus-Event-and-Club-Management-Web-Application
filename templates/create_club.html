{% extends 'base.html' %}
{% block content %}
<div class="container">
  <h1>Register Your Club</h1>
  <form method="POST" class="auth-form">
    <label>Club Name</label>
    <input type="text" name="club_name" placeholder="Club Name (e.g. Robotics Club)" required>

    <label>Description</label>
    <textarea name="club_desc" placeholder="What does your club do?" rows="4"></textarea>

    <button type="submit">Create Club</button>
  </form>
  <p class="auth-help"><a href="/dashboard">Back to Dashboard</a></p>
</div>
{% endblock %}
