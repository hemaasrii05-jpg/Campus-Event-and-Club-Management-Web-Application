<!DOCTYPE html>
<html>
<head>
    <title>Admin - Create Club</title>
</head>
<body style="font-family: sans-serif; padding: 50px; background-color: #f4f7f6;">
    <div style="background: white; padding: 30px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <h2>Create New Campus Club</h2>
        <p style="color: #666; font-size: 0.9rem; margin-top: -10px; margin-bottom: 20px;">Add an official student organization directly to the directory.</p>
        
        <form method="POST">
            <input type="text" name="club_name" placeholder="Club Name (e.g. Robotics Club)" style="width:100%; margin: 10px 0; padding: 10px; box-sizing: border-box;" required>
            <textarea name="club_desc" placeholder="What does your club do? (One-line summary)" style="width:100%; margin: 10px 0; padding: 10px; box-sizing: border-box;" rows="4" required></textarea>
            
            <button type="submit" style="width:100%; padding:10px; background: #e67e22; color: white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Create Club</button>
        </form>
        <br>
        <a href="{{ url_for('events.dashboard') }}">Back to Dashboard</a>
    </div>
</body>
</html>
