{% extends 'base.html' %}
{% block content %}
<div class="auth-card">
    <h2>Reset Password</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <p class="error">{{ messages[0] }}</p>
        {% endif %}
    {% endwith %}

    <form class="auth-form" method="POST">
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email" required>

        <label>New Password</label>
        <div class="password-wrapper">
            <input type="password" id="reset-password" name="new_password" placeholder="New password" required>
            <button type="button" class="toggle-password" data-target="reset-password" aria-label="Show password">👁</button>
        </div>

        <label>Confirm Password</label>
        <div class="password-wrapper">
            <input type="password" id="reset-confirm-password" name="confirm_password" placeholder="Confirm password" required>
            <button type="button" class="toggle-password" data-target="reset-confirm-password" aria-label="Show password">👁</button>
        </div>

        <button type="submit">Reset Password</button>
    </form>

    <p class="auth-help"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
</div>
{% endblock %}
